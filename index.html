<!DOCTYPE html>
<html>
<head>
  <title>QR Generator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;  
      align-items: center;     
      height: 100vh;
      margin: 0;
      gap:5rem;
      max-width: 800px;
      width: 90vw;
      margin-left: auto;
      margin-right: auto;
    }

    #qrcode {
      width: min(60vw, 400px);
      display: flex;
      justify-content: center;
    }

    #qrcode canvas,
    #qrcode img {
      width: 100% !important;
      height: auto !important;
    }

    #wallet {
      color: #1d1d1d;
      font-weight: bold;
      font-size: 1.75rem;
      font-family: Courier;
      text-align: center;
      word-break: break-all;
    }
  </style>
</head>

<body>
  <div id="qrcode"></div>
  <p id="wallet"></p>

  <script>
    const params = new URLSearchParams(window.location.search);
    let data = params.get("data");
    let extractedWallet = null;

    if (data) {
      new QRCode(document.getElementById("qrcode"), {
        text: data,
        width: 800,
        height: 800
      });

      if (data.startsWith("bitcoin:")) {
        extractedWallet = data.slice("bitcoin:".length).split('?')[0];
        document.getElementById("wallet").innerText = extractedWallet;
      }
    }
  </script>

</body>
</html>
